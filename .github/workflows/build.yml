name: Build
on:
  push:
    branches:
      - "*"
    paths-ignore:
      - ".gitignore"
  pull_request:
    branches:
      - "*"
    paths-ignore:
      - ".gitignore"
  workflow_dispatch:

permissions: write-all

jobs:
  build:
    runs-on: ubuntu-latest
    name: "Build and test"
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: 25
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build with Gradle
        run: ./gradlew build -x test --stacktrace

      - name: Extract version from Gradle
        id: extract_version
        run: |
          VERSION=$(./gradlew properties -q | grep "^mod\.version:" | awk '{print $2}' | tr -d '\r')
          echo "VERSION=${VERSION}" >> $GITHUB_ENV

      - name: Find and rename JAR
        run: |
          JAR_FILE=$(find build/libs/ -maxdepth 1 -name "*.jar" ! -name "*-sources.jar")
          echo "JAR_FILE=${JAR_FILE}" >> $GITHUB_ENV
          mv "$JAR_FILE" "build/libs/SecretRoutes-${{ env.VERSION }}-DEV.jar"

      - uses: actions/upload-artifact@v4
        name: Upload SRM
        with:
          name: "SecretRoutes-${{ env.VERSION }}-DEV"
          path: build/libs/SecretRoutes-${{ env.VERSION }}-DEV.jar